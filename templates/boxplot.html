<!DOCTYPE html>
<html>
<head>
    <title>Football Analytics - Boxplot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
        }

        h1 {
            color: #38bdf8;
        }

        img {
            width: 100%;
            max-width: 900px;
            border-radius: 10px;
            margin-top: 20px;
        }

        a {
            text-decoration: none;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>📊 Speed Distribution by Position</h1>

    <!-- BOXPLOT IMAGE -->
    <img src="data:image/png;base64,{{ graph }}" />

    <br>

    <a href="/stats">
        <button>⬅ Back to Stats</button>
    </a>

</div>

</body>
</html>
