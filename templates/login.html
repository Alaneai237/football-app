<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background-image: url("{{ url_for('static', filename='login.png') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* 👇 AGRANDIR LE FORMULAIRE */
.login-box {
    background: rgba(0, 0, 0, 0.6);
    color: white;
    padding: 40px;
    border-radius: 15px;
    width: 350px;          /* 👈 plus large */
    text-align: center;
}

/* 👇 INPUTS PLUS GRANDS */
.login-box input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

/* 👇 BOUTON */
.login-box button {
    width: 95%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #1e90ff;
    color: white;
    cursor: pointer;
}

.login-box button:hover {
    background: #0d6efd;
}
</style>
</head>
<body>

<h2>🔐 Connexion</h2>

<form action="/login" method="POST">

    <input type="text"
           name="username"
           placeholder="Username"
           required><br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required><br><br>

    <button type="submit">Login</button>

</form>

<br>

<a href="/register">Créer un compte</a>

</body>
</html>
